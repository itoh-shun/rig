name: rig daily improvement idea

# 毎日 昼の 12:00 JST に、rig の改善アイデアを1件だけ Issue 化する。
# - GitHub の cron は UTC。12:00 JST = 03:00 UTC。
# - scheduled workflow は「デフォルトブランチ(master)」上のファイルだけが発火する。
# - 実行には repo secret `ANTHROPIC_API_KEY` が必要。
# - 手動テストは Actions 画面の "Run workflow"（workflow_dispatch）から。

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC = 12:00 JST（昼休み）
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: rig-daily-idea
  cancel-in-progress: false

jobs:
  idea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create rig-idea  --description "rig 改善アイデア（自動生成）" --color 1d76db --force
          gh label create automated --description "automation が作成" --color ededed --force

      - name: Generate one rig improvement idea as an issue
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 30
            --allowedTools "Read,Glob,Grep,Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(gh search:*),Bash(git log:*)"
          prompt: |
            あなたは rig（このリポジトリ。Claude Code 用の LEGO 式ハーネス・コンポーザ）の
            改善アイデアを **1件だけ** 出して GitHub Issue を作るタスクです。実装はしません。

            ## 手順
            1. リポジトリを調べて rig を理解する：
               - `skills/rig/SKILL.md`（engine）、`README.md` / `README.ja.md`
               - `skills/rig/recipes/`・`skills/rig/facets/`・`skills/rig/patterns/`
               - `docs/superpowers/specs/`（既に設計/実装された機能の履歴）
               - `git log --oneline -30`（最近の変更）
            2. 重複回避：`gh issue list --label rig-idea --state all --limit 100` と
               `gh issue list --state open --limit 100` を見て、**既出/実装済みと被らない**ものを選ぶ。
            3. **最も価値の高い改善を1つだけ**選ぶ（小さく具体的・rig の思想に沿う）。
               例の観点：新 recipe / pattern / facet、既存フローの穴、ドメイン pack、
               doctor(`--validate`) の拡張、知識層(capture)の改善、ドキュメント整合、テスト/検証性。
               AI-slop・粒度の粗い「リファクタしよう」系は避け、受け入れ基準を書ける具体度にする。
            4. `gh issue create` で **Issue を1件だけ** 作る。`--label rig-idea,automated` を付ける。
               タイトルは簡潔に。本文は次の構成（Markdown）：
               - **背景 / 課題**（何が不足か・なぜ要るか。該当ファイルを参照）
               - **提案**（最小の1手。どのブリック/フローをどう足す/直すか）
               - **受け入れ基準**（機械/観点で合否が判定できる箇条書き）
               - **影響範囲 / 注意**（engine 改変の有無、pack-add か等）
               - **参照**（関連ファイルのパス）

            ## 厳守
            - **Issue は1件だけ**。複数作らない。実装・コミット・PR はしない。
            - 既存 Issue と内容が被るなら、新規作成せず「重複のため作成見送り」とだけ述べて終了する。
            - 事実に基づくこと（存在しないファイル/機能を捏造しない）。
