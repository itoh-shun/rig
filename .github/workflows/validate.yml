name: validate

# Automatically checks the recipe structure of the shipped tier.
# A subset of validate.md checks 1-3 (frontmatter schema, step references,
# extends chains) is verified mechanically by a Python script (scripts/validate.py).
# Any FAIL blocks the PR / rejects the master push.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run rig structural validator
        run: python3 scripts/validate.py

      - name: Run rig structural validator selftest (fixture regression)
        run: python3 scripts/validate.py selftest

      - name: Run computational orchestrator selftest (determinism)
        run: python3 scripts/orchestrate.py selftest
