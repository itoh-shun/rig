name: validate

# shipped tier の recipe 構造を自動チェック。
# validate.md ①②③ のサブセット（frontmatter スキーマ・step 参照・extends チェーン）を
# Python スクリプト（scripts/validate.py）で機械的に検査する。
# FAIL があれば PR をブロック / master push を通さない。

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run rig structural validator
        run: python3 scripts/validate.py

      - name: Run computational orchestrator selftest (determinism)
        run: python3 scripts/orchestrate.py selftest
