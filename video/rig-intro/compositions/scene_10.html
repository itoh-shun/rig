<template id="scene_10-template">
  <div id="root" class="scene_10-root" data-composition-id="scene_10" data-width="1920" data-height="1080" data-duration="7.52" style="position:relative; width:1920px; height:1080px; overflow:hidden;">
    <style>
      /* Scene 10 — "rig isn't just for dev": one harness spine, three sibling branches.
         Tokens declared globally in index.html <head>; reference via var(--*) only. */
      #root {
        background: var(--canvas);
        font-family: Inter, system-ui, sans-serif;
        color: var(--brand-primary);
      }
      #root *, #root *::before, #root *::after { box-sizing: border-box; }

      /* Paper grain — full-bleed atmosphere (decorative) */
      .s10-grain {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0.35;
        mix-blend-mode: multiply;
        background-image: var(--paper-grain);
      }

      /* Stage — flex column, centered */
      .s10-stage {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 100px 70px;
        gap: 28px;
      }

      .s10-chip {
        display: inline-block;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 24px;
        line-height: 1;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand-primary);
        opacity: 0.7;
      }

      .s10-hero {
        font-family: Inter, system-ui, sans-serif;
        font-weight: 700;
        font-size: 72px;
        letter-spacing: -0.02em;
        line-height: 1.05;
        text-align: center;
        margin: 0;
        color: var(--brand-primary);
        max-width: 1500px;
      }
      .s10-kw {
        display: inline-block;
        transform-origin: 50% 50%;
        will-change: transform, text-shadow;
      }

      /* Harness section — spine + branches */
      .s10-harness {
        position: relative;
        width: 1640px;
        height: 500px;
        display: block;
      }

      .s10-margin {
        position: absolute;
        top: 24px;
        left: 60px;
        z-index: 3;
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 600;
        font-size: 44px;
        line-height: 1;
        color: var(--brand-primary);
        margin: 0;
        transform-origin: left bottom;
      }

      .s10-spine-svg {
        position: absolute;
        top: 100px;
        left: 0;
        width: 100%;
        height: 80px;
        overflow: visible;
        z-index: 1;
      }
      .s10-spine-path {
        fill: none;
        stroke: var(--brand-primary);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .s10-spine-tick {
        fill: none;
        stroke: var(--brand-primary);
        stroke-width: 3;
        stroke-linecap: round;
      }
      .s10-spine-hair {
        position: absolute;
        top: 139px;
        left: 0;
        width: 100%;
        height: 2px;
        background: color-mix(in srgb, var(--brand-primary) 45%, transparent);
        opacity: 0;
        z-index: 0;
      }

      .s10-branches {
        position: absolute;
        top: 220px;
        left: 0;
        width: 100%;
        height: 280px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
        gap: 60px;
        padding: 0 80px;
        z-index: 3;
      }

      .s10-branch {
        position: relative;
        flex: 0 0 420px;
        height: 260px;
        will-change: transform, opacity;
        transform-origin: 50% 50%;
      }

      .s10-drop {
        position: absolute;
        top: -80px;
        left: 50%;
        width: 2px;
        height: 80px;
        background: color-mix(in srgb, var(--brand-primary) 55%, transparent);
        transform: translateX(-50%) scaleY(0);
        transform-origin: 50% 0%;
      }

      .s10-card {
        position: relative;
        background: var(--surface-cream);
        border: var(--border-hairline);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-pin-standard);
        padding: 28px 26px 22px;
        color: var(--brand-primary);
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100%;
      }

      .s10-pin {
        position: absolute;
        top: -16px;
        left: 50%;
        color: var(--brand-primary);
        transform-origin: 50% 50%;
        margin-left: -55px;
      }

      .s10-card-cmd {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 26px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        line-height: 1;
        color: var(--brand-primary);
      }
      .s10-card-icon {
        margin-top: 2px;
        align-self: flex-start;
      }
      .s10-card-role {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 600;
        font-size: 30px;
        line-height: 1;
        color: var(--brand-primary);
        opacity: 0.85;
        margin-top: 2px;
      }
      .s10-card-note {
        font-family: Inter, system-ui, sans-serif;
        font-weight: 400;
        font-size: 20px;
        line-height: 1.35;
        color: var(--brand-primary);
        margin: 0;
      }
    </style>

    <div class="s10-grain" aria-hidden="true"></div>

    <div class="s10-stage">
      <span class="s10-chip" id="s10-chip">FIELD REPORT 10 / SIBLINGS</span>

      <h1 class="s10-hero" id="s10-hero">
        rig isn't just for
        <span class="s10-kw" data-word="dev">開発者</span>
        だけじゃない。
      </h1>

      <div class="s10-harness" id="s10-harness">
        <p class="s10-margin" id="s10-margin">
          <span class="s10-kw" data-word="harness">同じハーネス</span>
        </p>

        <svg class="s10-spine-svg" viewBox="0 0 1640 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="s10-spine-path" id="s10-spine-main"
                d="M 30 40 C 280 32, 540 48, 820 40 C 1100 32, 1360 48, 1610 40" />
          <path class="s10-spine-tick" id="s10-spine-tick-l" d="M 410 40 L 410 70" />
          <path class="s10-spine-tick" id="s10-spine-tick-c" d="M 820 40 L 820 70" />
          <path class="s10-spine-tick" id="s10-spine-tick-r" d="M 1230 40 L 1230 70" />
        </svg>

        <div class="s10-spine-hair" id="s10-spine-hair" aria-hidden="true"></div>

        <div class="s10-branches">
          <div class="s10-branch" id="s10-branch-dev">
            <div class="s10-drop" id="s10-drop-dev" aria-hidden="true"></div>
            <div class="s10-card">
              <svg class="s10-pin" viewBox="0 0 360 110" width="110" height="32" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M312 38 C 296 32, 290 50, 304 58 C 320 66, 340 60, 342 44 C 344 28, 322 18, 300 24" />
                  <path d="M300 24 C 240 14, 140 14, 70 30" />
                  <path d="M312 56 C 250 78, 150 82, 80 70" />
                  <ellipse cx="58" cy="50" rx="24" ry="14" />
                </g>
              </svg>
              <span class="s10-card-cmd">/rig:dev</span>
              <svg class="s10-card-icon" width="72" height="46" viewBox="0 0 72 46" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M 22 6 L 8 23 L 22 40" />
                  <path d="M 50 6 L 64 23 L 50 40" />
                  <path d="M 42 4 L 30 42" stroke-width="3" />
                </g>
              </svg>
              <span class="s10-card-role">開発</span>
              <p class="s10-card-note">implement / review / PR</p>
            </div>
          </div>

          <div class="s10-branch" id="s10-branch-sales">
            <div class="s10-drop" id="s10-drop-sales" aria-hidden="true"></div>
            <div class="s10-card">
              <svg class="s10-pin" viewBox="0 0 360 110" width="110" height="32" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M312 38 C 296 32, 290 50, 304 58 C 320 66, 340 60, 342 44 C 344 28, 322 18, 300 24" />
                  <path d="M300 24 C 240 14, 140 14, 70 30" />
                  <path d="M312 56 C 250 78, 150 82, 80 70" />
                  <ellipse cx="58" cy="50" rx="24" ry="14" />
                </g>
              </svg>
              <span class="s10-card-cmd">/rig:sales</span>
              <svg class="s10-card-icon" width="86" height="46" viewBox="0 0 86 46" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M 6 26 L 22 12 L 36 22 L 30 28 L 22 22" />
                  <path d="M 80 26 L 64 12 L 50 22 L 56 28 L 64 22" />
                  <path d="M 36 22 L 50 22" />
                  <path d="M 30 28 L 42 36 L 56 28" />
                </g>
              </svg>
              <span class="s10-card-role">商談</span>
              <p class="s10-card-note">deal review / pitch / script</p>
            </div>
          </div>

          <div class="s10-branch" id="s10-branch-goal">
            <div class="s10-drop" id="s10-drop-goal" aria-hidden="true"></div>
            <div class="s10-card">
              <svg class="s10-pin" viewBox="0 0 360 110" width="110" height="32" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M312 38 C 296 32, 290 50, 304 58 C 320 66, 340 60, 342 44 C 344 28, 322 18, 300 24" />
                  <path d="M300 24 C 240 14, 140 14, 70 30" />
                  <path d="M312 56 C 250 78, 150 82, 80 70" />
                  <ellipse cx="58" cy="50" rx="24" ry="14" />
                </g>
              </svg>
              <span class="s10-card-cmd">/rig:goal</span>
              <svg class="s10-card-icon" width="54" height="54" viewBox="0 0 54 54" aria-hidden="true">
                <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="27" cy="27" r="22" />
                  <circle cx="27" cy="27" r="14" />
                  <circle cx="27" cy="27" r="6" />
                </g>
              </svg>
              <span class="s10-card-role">ゴール</span>
              <p class="s10-card-note">goal-driven loop</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const EASE = {
        entry: "power2.out",
        emphasis: "power3.out",
        exit: "power2.in",
        drift: "sine.inOut",
      };
      const DUR = { snap: 0.18, med: 0.5, slow: 0.95 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---- Initial hidden states ----
      gsap.set("#s10-chip", { opacity: 0, y: 8 });
      gsap.set("#s10-hero", { opacity: 0, y: 12 });
      gsap.set("#s10-margin", { opacity: 0, y: 6, rotation: -2 });
      gsap.set("#s10-spine-hair", { opacity: 0 });

      // Branches: cluster at spine center, hidden
      const branchEls = [
        document.getElementById("s10-branch-dev"),
        document.getElementById("s10-branch-sales"),
        document.getElementById("s10-branch-goal"),
      ];
      // Center pin tilts via GSAP rotation (CSS removed from .s10-pin individually)
      const pinEls = document.querySelectorAll(".s10-pin");
      // dev pin -10°, sales +14°, goal -10° (apply per-branch index)
      const PIN_TILTS = [-10, 14, -10];
      pinEls.forEach((p, i) => { gsap.set(p, { rotation: PIN_TILTS[i] }); });
      // Card askew tilts (subtle pinned-paper feel) — within ±2°
      gsap.set("#s10-branch-dev", { rotation: -1.2 });
      gsap.set("#s10-branch-sales", { rotation: 0.8 });
      gsap.set("#s10-branch-goal", { rotation: -0.6 });

      // ---- SVG path lengths for stroke-draw ----
      const spineMain = document.getElementById("s10-spine-main");
      const tickL = document.getElementById("s10-spine-tick-l");
      const tickC = document.getElementById("s10-spine-tick-c");
      const tickR = document.getElementById("s10-spine-tick-r");
      [spineMain, tickL, tickC, tickR].forEach((p) => {
        const len = p.getTotalLength();
        p.style.strokeDasharray = `${len}`;
        p.style.strokeDashoffset = `${len}`;
      });

      gsap.set("#s10-drop-dev, #s10-drop-sales, #s10-drop-goal", { scaleY: 0 });

      // === Phase 1 (0–2.0s): chip, hero, margin scribble + spine inks in ===
      tl.to("#s10-chip", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.0);
      tl.to("#s10-hero", { opacity: 1, y: 0, duration: DUR.slow, ease: EASE.entry }, 0.05);
      tl.to("#s10-margin", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.3);

      tl.to("#s10-spine-main", { strokeDashoffset: 0, duration: 1.15, ease: "power2.out" }, 0.6);
      tl.to("#s10-spine-tick-l", { strokeDashoffset: 0, duration: 0.25, ease: "power2.out" }, 1.55);
      tl.to("#s10-spine-tick-c", { strokeDashoffset: 0, duration: 0.25, ease: "power2.out" }, 1.65);
      tl.to("#s10-spine-tick-r", { strokeDashoffset: 0, duration: 0.25, ease: "power2.out" }, 1.75);

      // === Spine demotion (2.0–2.4s) ===
      tl.to("#s10-spine-main", { opacity: 0.25, duration: 0.4, ease: EASE.exit }, 2.0);
      tl.to(["#s10-spine-tick-l", "#s10-spine-tick-c", "#s10-spine-tick-r"],
            { opacity: 0.35, duration: 0.4, ease: EASE.exit }, 2.0);
      tl.to("#s10-spine-hair", { opacity: 1, duration: 0.4, ease: EASE.entry }, 2.0);

      // === Phase 2 (2.0–4.5s): three branches center-outward-expansion ===
      // Each branch starts at the spine center (negative-translate to dx=0) then
      // expands to its target (x=0 in the flex layout). Stagger 200ms.
      // dev → from x:+530 to 0; sales → from x:0 to 0 (drops in place); goal → from x:-530 to 0
      const FROM_X = [530, 0, -530];
      branchEls.forEach((el, i) => {
        const fromX = FROM_X[i];
        const restRot = [-1.2, 0.8, -0.6][i];
        tl.fromTo(el,
          { opacity: 0, x: fromX, y: -18, scale: 0.7, rotation: 0 },
          { opacity: 1, x: 0, y: 0, scale: 1, rotation: restRot, duration: 1.3, ease: EASE.emphasis },
          2.0 + i * 0.2);
      });

      tl.to("#s10-drop-dev", { scaleY: 1, duration: 0.45, ease: EASE.entry }, 2.7);
      tl.to("#s10-drop-sales", { scaleY: 1, duration: 0.45, ease: EASE.entry }, 2.9);
      tl.to("#s10-drop-goal", { scaleY: 1, duration: 0.45, ease: EASE.entry }, 3.1);

      // === ASR keyword glow on 開発者 + 同じハーネス ===
      const TIMINGS = {
        dev:     { start: 0.55, end: 1.15 },
        harness: { start: 1.0,  end: 1.9 },
      };
      const ATTACK_DUR = 0.18;
      const RELEASE = 0.45;
      const REST_LEVEL = 0.22;
      const MAX_BLUR = 18;
      const MAX_SCALE_BOOST = 0.05;
      const SCENE_DURATION = 7.52;

      function envelope(time, start, end) {
        const releaseEnd = end + RELEASE;
        if (time < start) return 0;
        if (time < end) {
          return Math.min((time - start) / ATTACK_DUR, 1);
        }
        if (time < releaseEnd) {
          const decay = (time - end) / RELEASE;
          return 1 - decay * (1 - REST_LEVEL);
        }
        return REST_LEVEL;
      }

      const kwEls = document.querySelectorAll(".s10-kw");
      const driver = { t: 0 };
      tl.to(driver, {
        t: SCENE_DURATION,
        duration: SCENE_DURATION,
        ease: "none",
        onUpdate: () => {
          kwEls.forEach((el) => {
            const word = el.dataset.word;
            const timing = TIMINGS[word];
            if (!timing) return;
            const env = envelope(driver.t, timing.start, timing.end);
            const blur = MAX_BLUR * env;
            const scale = 1 + MAX_SCALE_BOOST * env;
            el.style.textShadow = `0 0 ${blur}px rgba(31, 58, 138, ${0.15 + env * 0.45})`;
            el.style.transform = `scale(${scale})`;
          });
        }
      }, 0);

      // === Sine-wave-loop: ONLY center /rig:sales card. Anti-wobble HARD ===
      // ±0.4% scale + ±1px y, ~3.4s/cycle, FADE_FRAC ensures last 0.5s of scene is static.
      // Idle window: 4.7 → 7.02 (duration 2.32s); scene tail 7.02–7.52 has no scheduled tween.
      const IDLE_START = 4.7;
      const IDLE_DUR = 2.32;
      const CYCLES = IDLE_DUR / 3.4;
      const FADE_FRAC = 0.25;
      const phase = { p: 0 };
      const salesCard = document.getElementById("s10-branch-sales");
      const salesRestRot = 0.8;
      tl.to(phase, {
        p: Math.PI * 2 * CYCLES,
        duration: IDLE_DUR,
        ease: "none",
        onUpdate: () => {
          const t = phase.p / (Math.PI * 2 * CYCLES);
          const env = t < 1 - FADE_FRAC ? 1 : Math.max(0, (1 - t) / FADE_FRAC);
          const s = 1 + Math.sin(phase.p) * 0.004 * env;
          const y = Math.sin(phase.p) * 1.0 * env;
          // Compose onto the rest pose (x:0, y:0, scale:1, rotation:0.8)
          salesCard.style.transform = `translate(0px, ${y}px) scale(${s}) rotate(${salesRestRot}deg)`;
        }
      }, IDLE_START);

      window.__timelines["scene_10"] = tl;
    </script>
  </div>
</template>
