    <style>

    <script>
      // ===== EASE / DUR — canonical role keys from film direction =====
      const EASE = {
        entry: "power2.out",
        emphasis: "power3.out",
        exit: "power2.in",
        drift: "sine.inOut",
      };
      const DUR = { snap: 0.18, med: 0.5, slow: 0.95 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ============================================================
      // INITIAL STATES (gsap.set — never CSS opacity:0)
      // ============================================================
      gsap.set("#s7-dispatch", { opacity: 0, y: 12 });
      gsap.set("#s7-dispatch-line .s7-word", { opacity: 0 });
      gsap.set("#s7-dispatch-cursor", { opacity: 0 });

      gsap.set("#s7-card-1", { opacity: 0, y: 24, rotation: -3, scale: 0.96 });
      gsap.set("#s7-card-2", { opacity: 0, y: 18, rotation: 0, scale: 0.96 });
      gsap.set("#s7-card-3", { opacity: 0, y: 24, rotation: 3, scale: 0.96 });

      gsap.set("#s7-parent-rail", { opacity: 0 });
      gsap.set("#s7-margin-note", { opacity: 0, y: 6 });

      // Pencil marks under each card — measured stroke-dasharray for svg-path-draw
      const markSels = ["#s7-mark-1", "#s7-mark-2", "#s7-mark-3"];
      markSels.forEach((sel) => {
        const p = document.querySelector(sel);
        if (p) {
          const L = p.getTotalLength();
          p.style.strokeDasharray = String(L);
          p.style.strokeDashoffset = String(L);
        }
      });

      // ============================================================
      // PHASE 1 (0.0 - 1.0s) — pipeline strip primary; RUN inks active
      // ============================================================
      tl.fromTo(
        "#s7-run-dot",
        { backgroundColor: "rgba(0,0,0,0)" },
        { backgroundColor: "#C2342B", duration: DUR.med, ease: EASE.emphasis },
        0.2,
      );
      tl.fromTo(
        "#s7-run-label",
        { color: "#7a7a7a" },
        { color: "#1F3A8A", duration: DUR.med, ease: EASE.emphasis },
        0.25,
      );

      // ============================================================
      // PHASE 2 (1.0 - 4.5s) — dispatch line primary
      // dynamic-content-sequencing — reveal-by-word at paced timings
      // ============================================================
      tl.to("#s7-dispatch", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.9);
      tl.to("#s7-dispatch-cursor", { opacity: 1, duration: DUR.snap, ease: "none" }, 1.1);

      const WORD_KEYS = ["agent", "parallel", "open", "sec", "des", "tst", "close"];
      const WORD_TIMINGS = {
        agent:    { start: 1.30, end: 1.55 },
        parallel: { start: 1.62, end: 2.00 },
        open:     { start: 2.10, end: 2.22 },
        sec:      { start: 2.30, end: 2.78 },
        des:      { start: 2.90, end: 3.30 },
        tst:      { start: 3.42, end: 3.82 },
        close:    { start: 3.95, end: 4.15 },
      };

      WORD_KEYS.forEach((k) => {
        const sel = `.s7-dispatch-line .s7-word[data-word="${k}"]`;
        tl.fromTo(sel,
          { opacity: 0, y: 4 },
          { opacity: 1, y: 0, duration: DUR.snap, ease: EASE.entry },
          WORD_TIMINGS[k].start,
        );
      });

      // asr-keyword-glow envelope across the keyword words (parallel + sec / des / tst).
      // Single linear driver writes textShadow blur + scale boost per envelope shape.
      const GLOW_DRIVER_START = 1.30;
      const GLOW_DRIVER_DUR = 3.0;
      const ATTACK_DUR = 0.12;
      const RELEASE = 0.32;
      const REST_LEVEL = 0.22;
      const MAX_BLUR = 18;
      const MAX_SCALE_BOOST = 0.06;
      const KEYWORD_KEYS = ["parallel", "sec", "des", "tst"];
      function envelope(time, start, end) {
        const releaseEnd = end + RELEASE;
        if (time < start) return 0;
        if (time < end) {
          return Math.min((time - start) / ATTACK_DUR, 1);
        }
        if (time < releaseEnd) {
          const decay = (time - end) / RELEASE;
          return 1 - decay * (1 - REST_LEVEL);
        }
        return REST_LEVEL;
      }
      const glowDriver = { t: 0 };
      tl.to(glowDriver, {
        t: GLOW_DRIVER_DUR,
        duration: GLOW_DRIVER_DUR,
        ease: "none",
        onUpdate: () => {
          const localT = GLOW_DRIVER_START + glowDriver.t;
          KEYWORD_KEYS.forEach((k) => {
            const el = document.querySelector(
              `.s7-dispatch-line .s7-word[data-word="${k}"]`,
            );
            if (!el) return;
            const tg = WORD_TIMINGS[k];
            const env = envelope(localT, tg.start, tg.end);
            const blur = MAX_BLUR * env;
            const scale = 1 + MAX_SCALE_BOOST * env;
            el.style.textShadow = `0 0 ${blur}px rgba(194, 52, 43, ${0.18 + env * 0.42})`;
            el.style.transform = `scale(${scale})`;
          });
        },
      }, GLOW_DRIVER_START);

      // ============================================================
      // HANDOFF (4.30 - 4.85s) — dispatch compacts to a hairline ribbon
      // and slides up to sit just under the pipeline strip; parent rail
      // appears as a single thin hairline rule outside the primary bbox.
      // ============================================================
      tl.to("#s7-dispatch-cursor", { opacity: 0, duration: DUR.snap, ease: "none" }, 4.25);
      // Compact + slide up. Dispatch sits at top:460, height ~130 (center ~525).
      // Move toward y ~ 210 (just under ribbon) -> dy = 210 - 525 = -315
      tl.to("#s7-dispatch", {
        y: -315,
        scaleY: 0.16,
        scaleX: 0.80,
        opacity: 0.55,
        duration: 0.55,
        ease: EASE.emphasis,
      }, 4.30);
      tl.to("#s7-dispatch-line", { opacity: 0, duration: DUR.snap, ease: EASE.exit }, 4.30);

      // Parent rail appears (the demoted parent context — supporting only)
      tl.to("#s7-parent-rail", { opacity: 1, duration: DUR.med, ease: EASE.entry }, 4.50);

      // ============================================================
      // PHASE 3 (4.50 - 8.96s) — three subagent fan-cards primary
      // svg-path-draw on the pencil mark under each card; staggered ~350ms total
      // ============================================================
      const CARD_BASE = 4.60;
      const CARD_STAGGER = 0.18; // ~360ms across 3 cards
      const CARDS = [
        { sel: "#s7-card-1", mark: "#s7-mark-1", rot: -3 },
        { sel: "#s7-card-2", mark: "#s7-mark-2", rot: 0 },
        { sel: "#s7-card-3", mark: "#s7-mark-3", rot: 3 },
      ];
      CARDS.forEach((c, i) => {
        const at = CARD_BASE + i * CARD_STAGGER;
        tl.to(c.sel, {
          opacity: 1,
          y: 0,
          rotation: c.rot,
          scale: 1,
          duration: 0.7,
          ease: EASE.entry,
        }, at);
        // pencil mark draws (svg-path-draw) after the card lands
        tl.to(c.mark, { strokeDashoffset: 0, duration: 0.65, ease: "power2.out" }, at + 0.45);
      });

      // Margin scribble lands after the cards settle
      tl.to("#s7-margin-note", {
        opacity: 1,
        y: 0,
        duration: DUR.med,
        ease: EASE.entry,
      }, 5.95);

      // ============================================================
      // sine-wave-loop — ONE element only: parent hairline rail (the "alive but empty" rail).
      // Anti-wobble HARD: ≤ ±0.5% / ±1px; subtle floor amplitude.
      // Runs from idle start to (data-duration - 0.5s) so the final 0.5s is fully static.
      // ============================================================
      const IDLE_START = 6.40;
      const IDLE_DUR = 8.96 - 0.5 - IDLE_START; // = 2.06s
      const CYCLES = IDLE_DUR / 3.2; // ~3.2s breath cycle
      const SCALE_AMP = 0.005; // ±0.5%
      const Y_AMP_PX = 1.0;    // ±1px
      const FADE_FRAC = 0.3;
      const idle = { p: 0 };
      tl.to(idle, {
        p: Math.PI * 2 * CYCLES,
        duration: IDLE_DUR,
        ease: "none",
        onUpdate: () => {
          const t = idle.p / (Math.PI * 2 * CYCLES);
          const env = t < 1 - FADE_FRAC ? 1 : Math.max(0, (1 - t) / FADE_FRAC);
          const ph = idle.p;
          const s = 1 + Math.sin(ph) * SCALE_AMP * env;
          const yy = Math.sin(ph) * Y_AMP_PX * env;
          const rail = document.querySelector("#s7-parent-rail-line");
          if (rail) {
            rail.style.transform = `translateY(${yy}px) scaleX(${s})`;
          }
        },
      }, IDLE_START);

      // Final 0.5s: nothing scheduled — three cards hold fully pinned at their tilts (static).

      window.__timelines["scene_7"] = tl;
    </script>
