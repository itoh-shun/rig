    <script>
      const EASE = {
        entry: "power2.out",
        emphasis: "power3.out",
        exit: "power2.in",
        drift: "sine.inOut",
      };
      const DUR = { snap: 0.18, med: 0.5, slow: 0.95 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Segment local-start offsets (must match dispatch local_start_s)
      const T = { s4: 0, s5: 7.96, s6: 16.0 };

      // ---------- Initial hidden states (via gsap.set, never CSS opacity:0) ----------
      gsap.set("#s4-segment", { opacity: 0, y: 16 });
      gsap.set("#s4-callout-flag", { opacity: 0, scale: 0.92, rotation: 2 });
      gsap.set("#s4-callout-freeform", { opacity: 0, scale: 0.92, rotation: -2 });
      gsap.set("#s5-segment", { opacity: 0, y: 22 });
      gsap.set(["#s5-rule-1", "#s5-rule-2", "#s5-rule-3", "#s5-rule-4"], { opacity: 0, x: -18 });
      gsap.set("#s5-margin", { opacity: 0, x: 24, rotation: -2 });
      gsap.set("#g4-memory-rail", { opacity: 0, x: 24 });
      gsap.set("#s6-segment", { opacity: 0, y: 22 });
      gsap.set(["#s6-slot-1","#s6-slot-2","#s6-slot-3","#s6-slot-4","#s6-slot-5"], { opacity: 0 });

      // Stage pills — set initial tilt floor via GSAP
      gsap.set("#g4-stage-parse",   { rotation: -1.2 });
      gsap.set("#g4-stage-resolve", { rotation:  1.0 });
      gsap.set("#g4-stage-compose", { rotation: -0.8 });
      gsap.set("#g4-stage-run",     { rotation:  1.2 });

      // SVG path-draw init for scene_4 arrows + scene_5 margin arrow
      const arrowPaths = ["#s4-arrow-flag", "#s4-arrow-flag-head", "#s4-arrow-freeform", "#s4-arrow-freeform-head", "#s5-margin-path", "#s5-margin-head"];
      arrowPaths.forEach((sel) => {
        const p = document.querySelector(sel);
        if (!p) return;
        const len = p.getTotalLength();
        p.style.strokeDasharray = String(len);
        p.style.strokeDashoffset = String(len);
      });

      // ====================================================================
      // SEGMENT A — scene_4 (0 -> 7.96s)
      // discrete-text-sequence types the command;
      // svg-path-draw inks the two lasso arrows;
      // sine-wave-loop on PARSE pill (subtle floor).
      // ====================================================================

      tl.fromTo("#s4-segment",
        { opacity: 0, y: 16 },
        { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry },
        T.s4 + 0.20
      );

      // (2) discrete-text-sequence — typing the command
      const FULL = '/rig:dev "review my branch" --focus security';
      const SEQUENCE = [
        { t: 0.00, text: "" },
        { t: 0.20, text: "/rig" },
        { t: 0.45, text: "/rig:dev" },
        { t: 0.78, text: '/rig:dev "review' },
        { t: 1.10, text: '/rig:dev "review my' },
        { t: 1.45, text: '/rig:dev "review my brnch"' },
        { t: 1.78, text: '/rig:dev "review my br' },
        { t: 2.05, text: '/rig:dev "review my branch"' },
        { t: 2.35, text: '/rig:dev "review my branch" --' },
        { t: 2.70, text: '/rig:dev "review my branch" --focus' },
        { t: 3.05, text: FULL },
      ];
      function textAt(time) {
        for (let i = SEQUENCE.length - 1; i >= 0; i--) {
          if (time >= SEQUENCE[i].t) return SEQUENCE[i].text;
        }
        return "";
      }
      const textEl = document.getElementById("s4-text");
      const cursorEl = document.getElementById("s4-cursor");
      const driver4 = { t: 0 };
      tl.to(driver4,
        {
          t: 3.4,
          duration: 3.4,
          ease: "none",
          onUpdate: () => { textEl.textContent = textAt(driver4.t); },
        },
        T.s4 + 0.55
      );
      const blink4 = { p: 0 };
      tl.to(blink4,
        {
          p: Math.PI * 2 * 5,
          duration: 4.2,
          ease: "none",
          onUpdate: () => { cursorEl.style.opacity = Math.sin(blink4.p) > 0 ? "1" : "0"; },
        },
        T.s4 + 0.55
      );

      // (3) Two scribble callouts ink in AFTER typing completes
      tl.fromTo("#s4-callout-flag",
        { opacity: 0, scale: 0.92, rotation: 2 },
        { opacity: 1, scale: 1, rotation: 1.6, duration: DUR.med, ease: EASE.emphasis },
        T.s4 + 4.05
      );
      tl.to("#s4-arrow-flag",
        { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" },
        T.s4 + 4.20
      );
      tl.to("#s4-arrow-flag-head",
        { strokeDashoffset: 0, duration: 0.18, ease: "power2.out" },
        T.s4 + 4.70
      );

      tl.fromTo("#s4-callout-freeform",
        { opacity: 0, scale: 0.92, rotation: -2 },
        { opacity: 1, scale: 1, rotation: -1.5, duration: DUR.med, ease: EASE.emphasis },
        T.s4 + 4.80
      );
      tl.to("#s4-arrow-freeform",
        { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" },
        T.s4 + 4.95
      );
      tl.to("#s4-arrow-freeform-head",
        { strokeDashoffset: 0, duration: 0.18, ease: "power2.out" },
        T.s4 + 5.45
      );

      // (4) sine-wave-loop on active PARSE pill (subtle floor)
      const phaseA = { p: 0 };
      tl.to(phaseA,
        {
          p: Math.PI * 2 * 2.2,
          duration: 6.5,
          ease: "none",
          onUpdate: () => {
            const s = 1 + Math.sin(phaseA.p) * 0.005;
            const y = Math.sin(phaseA.p) * 1;
            const el = document.getElementById("g4-stage-parse");
            if (el) el.style.transform = "translateY(" + y + "px) scale(" + s + ") rotate(-1.2deg)";
          },
        },
        T.s4 + 0.80
      );

      // ====================================================================
      // SEGMENT B — scene_5 (7.96 -> 16.0s)
      // PARSE -> RESOLVE pill scale-swap;
      // svg-path-draw inks each rule card outline;
      // sine-wave-loop on active RESOLVE pill.
      // ====================================================================

      tl.to("#s4-segment",
        { opacity: 0, y: -8, duration: 0.42, ease: EASE.exit },
        T.s5 - 0.42
      );

      // PARSE active -> ghost
      tl.to("#g4-stage-parse",
        { scale: 0.92, duration: 0.32, ease: EASE.exit, onStart: () => {
            const el = document.getElementById("g4-stage-parse");
            if (el) { el.classList.remove("g4-active"); el.classList.add("g4-ghost"); }
          }
        },
        T.s5 - 0.02
      );
      tl.to("#g4-stage-parse",
        { scale: 1, duration: 0.28, ease: EASE.entry },
        T.s5 + 0.30
      );
      // RESOLVE ghost -> active (no back.out per film direction; use power3.out)
      tl.fromTo("#g4-stage-resolve",
        { scale: 0.78 },
        { scale: 1, duration: 0.55, ease: EASE.emphasis, onStart: () => {
            const el = document.getElementById("g4-stage-resolve");
            if (el) { el.classList.remove("g4-ghost"); el.classList.add("g4-active"); }
          }
        },
        T.s5 + 0.18
      );

      // Segment B entry
      tl.fromTo("#s5-segment",
        { opacity: 0, y: 22 },
        { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry },
        T.s5 + 0.30
      );

      // Four rule cards ink-in top-to-bottom
      const ruleIds = ["#s5-rule-1", "#s5-rule-2", "#s5-rule-3", "#s5-rule-4"];
      ruleIds.forEach((sel, i) => {
        tl.fromTo(sel,
          { opacity: 0, x: -18 },
          { opacity: 1, x: 0, duration: DUR.med, ease: EASE.entry },
          T.s5 + 0.80 + i * 0.55
        );
      });

      // Margin scribble + arrow
      tl.fromTo("#s5-margin",
        { opacity: 0, x: 24, rotation: -2 },
        { opacity: 1, x: 0, rotation: -2, duration: DUR.med, ease: EASE.entry },
        T.s5 + 3.30
      );
      tl.to("#s5-margin-path",
        { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" },
        T.s5 + 3.55
      );
      tl.to("#s5-margin-head",
        { strokeDashoffset: 0, duration: 0.18, ease: "power2.out" },
        T.s5 + 4.05
      );

      // sine-wave-loop on RESOLVE pill (subtle floor)
      const phaseB = { p: 0 };
      tl.to(phaseB,
        {
          p: Math.PI * 2 * 2.4,
          duration: 6.2,
          ease: "none",
          onUpdate: () => {
            const s = 1 + Math.sin(phaseB.p) * 0.005;
            const y = Math.sin(phaseB.p) * 1;
            const el = document.getElementById("g4-stage-resolve");
            if (el) el.style.transform = "translateY(" + y + "px) scale(" + s + ") rotate(1.0deg)";
          },
        },
        T.s5 + 0.75
      );

      // ====================================================================
      // SEGMENT C — scene_6 (16.0 -> 21.6s, 5.6s)
      // RESOLVE -> COMPOSE scale-swap;
      // rule stack demotes (exits) and memory rail enters at right;
      // dynamic-content-sequencing paces the 5 prompt-skeleton slot ink-ins.
      // ====================================================================

      tl.to("#g4-stage-resolve",
        { scale: 0.92, duration: 0.30, ease: EASE.exit, onStart: () => {
            const el = document.getElementById("g4-stage-resolve");
            if (el) { el.classList.remove("g4-active"); el.classList.add("g4-ghost"); }
          }
        },
        T.s6 - 0.02
      );
      tl.to("#g4-stage-resolve",
        { scale: 1, duration: 0.26, ease: EASE.entry },
        T.s6 + 0.28
      );
      tl.fromTo("#g4-stage-compose",
        { scale: 0.78 },
        { scale: 1, duration: 0.55, ease: EASE.emphasis, onStart: () => {
            const el = document.getElementById("g4-stage-compose");
            if (el) { el.classList.remove("g4-ghost"); el.classList.add("g4-active"); }
          }
        },
        T.s6 + 0.15
      );

      // Demote rule stack — exit to clear the canvas before skeleton enters
      tl.to("#s5-segment",
        { opacity: 0, scale: 0.86, duration: 0.42, ease: EASE.exit, transformOrigin: "0% 0%" },
        T.s6 - 0.15
      );
      tl.to("#s5-margin",
        { opacity: 0, duration: 0.32, ease: EASE.exit },
        T.s6 - 0.15
      );

      // Memory rail fade-in (right margin, well clear of skeleton)
      tl.fromTo("#g4-memory-rail",
        { opacity: 0, x: 24 },
        { opacity: 1, x: 0, duration: DUR.med, ease: EASE.entry },
        T.s6 + 0.20
      );

      // Segment C skeleton entry
      tl.fromTo("#s6-segment",
        { opacity: 0, y: 22 },
        { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry },
        T.s6 + 0.35
      );

      // dynamic-content-sequencing — five slot labels ink in at content-aware pace
      const slots = [
        { sel: "#s6-slot-1", label: "ROLE" },
        { sel: "#s6-slot-2", label: "CONTEXT" },
        { sel: "#s6-slot-3", label: "TASK" },
        { sel: "#s6-slot-4", label: "CONSTRAINTS" },
        { sel: "#s6-slot-5", label: "OUTPUT" },
      ];
      let cursor = 0.70;
      slots.forEach((s) => {
        tl.fromTo(s.sel,
          { opacity: 0 },
          { opacity: 1, duration: DUR.med, ease: EASE.entry },
          T.s6 + cursor
        );
        cursor += 0.30 + s.label.length * 0.04;
      });

      // sine-wave-loop on COMPOSE pill (subtle floor)
      const phaseC = { p: 0 };
      tl.to(phaseC,
        {
          p: Math.PI * 2 * 1.5,
          duration: 4.0,
          ease: "none",
          onUpdate: () => {
            const s = 1 + Math.sin(phaseC.p) * 0.005;
            const y = Math.sin(phaseC.p) * 1;
            const el = document.getElementById("g4-stage-compose");
            if (el) el.style.transform = "translateY(" + y + "px) scale(" + s + ") rotate(-0.8deg)";
          },
        },
        T.s6 + 0.60
      );

      window.__timelines["group_w4"] = tl;
    </script>
  </div>
</template>
