<template id="scene_9-template">
  <div id="root" class="scene_9-root" data-composition-id="scene_9" data-width="1920" data-height="1080" data-duration="7.8" style="position:relative; width:1920px; height:1080px; overflow:hidden;">
    <style>
      /* Scene 9 — triptych reviewer panes; three VERDICT stamps land in staccato.
         Tokens declared globally in index.html; reference via var(). */
      #root {
        background: var(--canvas);
        font-family: Inter, system-ui, sans-serif;
        color: var(--brand-primary);
      }
      #root *,
      #root *::before,
      #root *::after { box-sizing: border-box; }

      /* Paper grain — full-bleed atmosphere (decorative, exempt from keep-out) */
      .s9-grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.35;
        mix-blend-mode: multiply;
        background-image: var(--paper-grain);
      }

      /* Stage — provides slow parallax drift (single macro motion at root scope) */
      .s9-stage {
        position: absolute;
        inset: 0;
        z-index: 2;
        padding: 90px 96px 96px;
        display: flex;
        flex-direction: column;
        gap: 36px;
      }

      /* Command bar — DM Mono uppercase, one breathing caret element. */
      .s9-cmdbar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 34px;
        line-height: 1;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand-primary);
        padding: 14px 28px;
        border: var(--border-hairline);
        border-radius: var(--radius-card);
        background: var(--surface-cream);
        align-self: center;
      }
      .s9-cmd-prompt {
        opacity: 0.65;
      }
      .s9-caret {
        display: inline-block;
        width: 18px;
        height: 28px;
        background: var(--brand-primary);
        margin-left: 6px;
        will-change: transform, opacity;
      }

      /* Triptych row */
      .s9-row {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: stretch;
        gap: 48px;
        flex: 1;
        min-height: 0;
      }

      .s9-pane {
        position: relative;
        background: var(--surface-cream);
        border: var(--border-hairline);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-pin-standard);
        padding: 36px 32px 32px;
        width: 480px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        color: var(--brand-primary);
      }
      .s9-pane.s9-pane-a { /* keep distinct surface tones */
        background: var(--surface-cream);
      }
      .s9-pane.s9-pane-b {
        background: var(--surface-paper-2);
      }
      .s9-pane.s9-pane-c {
        background: var(--surface-paper-3);
      }

      .s9-pane-head {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand-primary);
        padding-bottom: 12px;
        border-bottom: var(--border-hairline);
      }

      .s9-pane-num {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.6;
        line-height: 1;
      }

      .s9-bullets {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
        flex: 1;
      }
      .s9-bullet {
        font-family: Inter, system-ui, sans-serif;
        font-weight: 400;
        font-size: 24px;
        line-height: 1.35;
        margin: 0;
        position: relative;
        padding-bottom: 10px;
        color: var(--brand-primary);
      }
      .s9-bullet-svg {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 6px;
        overflow: visible;
        pointer-events: none;
      }
      .s9-bullet-svg path {
        fill: none;
        stroke: var(--brand-primary);
        stroke-width: 2;
        stroke-linecap: round;
      }

      /* Verdict stamp — cinnabar-red rotated stamp, locked at -4°.
         Stamps live in flow at the BOTTOM of each pane (align-self center)
         so they cannot collide with the head row. */
      .s9-stamp {
        align-self: center;
        display: inline-block;
        border: var(--border-stamp);
        color: var(--brand-accent);
        background: var(--surface-cream);
        padding: 10px 22px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 32px;
        line-height: 1;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        border-radius: 0;
        margin-top: 10px;
        will-change: transform, opacity;
      }

      /* Keyword glow targets — applied to two phrase chips below the triptych */
      .s9-phrase {
        align-self: center;
        display: flex;
        gap: 20px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brand-primary);
        opacity: 0.85;
      }
      .s9-kw {
        display: inline-block;
        padding: 8px 14px;
        border: var(--border-dashed);
        border-radius: var(--radius-pill);
        transform-origin: 50% 50%;
        will-change: transform, text-shadow;
        background: var(--surface-cream);
      }
    </style>

    <div class="s9-grain" aria-hidden="true"></div>

    <div class="s9-stage" id="s9-stage">
      <!-- Command bar -->
      <div class="s9-cmdbar" id="s9-cmdbar">
        <span class="s9-cmd-prompt">$</span>
        <span class="s9-cmd-text">/rig:dev --review</span>
        <span class="s9-caret" id="s9-caret" aria-hidden="true"></span>
      </div>

      <!-- Triptych: three reviewer panes -->
      <div class="s9-row">
        <div class="s9-pane s9-pane-a" id="s9-pane-a">
          <span class="s9-pane-num">01</span>
          <div class="s9-pane-head">セキュリティ</div>
          <ul class="s9-bullets">
            <li class="s9-bullet" id="s9-b-a1">権限境界の検査
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-a1" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-a2">入力サニタイズ確認
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-a2" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-a3">監査ログの網羅
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-a3" d="M 0 3 L 400 3" />
              </svg>
            </li>
          </ul>
          <span class="s9-stamp" id="s9-stamp-a">VERDICT</span>
        </div>

        <div class="s9-pane s9-pane-b" id="s9-pane-b">
          <span class="s9-pane-num">02</span>
          <div class="s9-pane-head">デザイン</div>
          <ul class="s9-bullets">
            <li class="s9-bullet" id="s9-b-b1">命名と抽象度
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-b1" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-b2">後方互換の確認
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-b2" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-b3">代替案との比較
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-b3" d="M 0 3 L 400 3" />
              </svg>
            </li>
          </ul>
          <span class="s9-stamp" id="s9-stamp-b">VERDICT</span>
        </div>

        <div class="s9-pane s9-pane-c" id="s9-pane-c">
          <span class="s9-pane-num">03</span>
          <div class="s9-pane-head">テスト</div>
          <ul class="s9-bullets">
            <li class="s9-bullet" id="s9-b-c1">既存テストの整合
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-c1" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-c2">追加要否の判断
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-c2" d="M 0 3 L 400 3" />
              </svg>
            </li>
            <li class="s9-bullet" id="s9-b-c3">検証可能性の評価
              <svg class="s9-bullet-svg" viewBox="0 0 400 6" preserveAspectRatio="none">
                <path id="s9-p-c3" d="M 0 3 L 400 3" />
              </svg>
            </li>
          </ul>
          <span class="s9-stamp" id="s9-stamp-c">VERDICT</span>
        </div>
      </div>

      <!-- ASR-keyword-glow targets -->
      <div class="s9-phrase">
        <span class="s9-kw" id="s9-kw-parallel" data-word="parallel">並列</span>
        <span class="s9-kw" id="s9-kw-verdict" data-word="verdict">ヴァーディクト</span>
      </div>
    </div>

    <script>
      // Canonical easings / durations from this preset (pasted from chunks/easings.js).
      const EASE = {
        entry: "power2.out",
        emphasis: "power3.out",
        exit: "power2.in",
        drift: "sine.inOut",
      };
      const DUR = { snap: 0.18, med: 0.5, slow: 0.95 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---------- Initial hidden states (gsap.set, not CSS opacity:0) ----------
      gsap.set("#s9-stage", { opacity: 0, y: 14 });
      gsap.set("#s9-cmdbar", { opacity: 0, y: -10 });
      gsap.set(".s9-pane", { opacity: 0, y: 18 });
      gsap.set([".s9-bullet"], { opacity: 0 });
      gsap.set("#s9-stamp-a", { opacity: 0, scale: 1.18, rotation: -4, transformOrigin: "50% 50%" });
      gsap.set("#s9-stamp-b", { opacity: 0, scale: 1.18, rotation: -4, transformOrigin: "50% 50%" });
      gsap.set("#s9-stamp-c", { opacity: 0, scale: 1.18, rotation: -4, transformOrigin: "50% 50%" });
      gsap.set(".s9-kw", { opacity: 0, y: 8 });

      // ---------- SVG path-draw setup — measure lengths, set dasharray ----------
      const paths = document.querySelectorAll(".s9-bullet-svg path");
      paths.forEach((p) => {
        const len = p.getTotalLength() || 400;
        p.style.strokeDasharray = String(len);
        p.style.strokeDashoffset = String(len);
      });

      // ---------- Entry — stage + command bar (0.0 – 0.6s) ----------
      tl.to("#s9-stage", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.0);
      tl.to("#s9-cmdbar", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.05);

      // ---------- Triptych panes settle (0.35 – 0.95s) ----------
      tl.to("#s9-pane-a", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.35);
      tl.to("#s9-pane-b", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.5);
      tl.to("#s9-pane-c", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 0.65);

      // ---------- Bullet inking — dynamic-content-sequencing assigns ----------
      // Sequence config: per-bullet draw config (text length + speed factor).
      // The sequencer pre-computes absolute start times and the path-draw fires.
      const BULLET_BASE = 0.32; // base seconds per bullet
      const SEC_PER_CHAR = 0.012;
      const HOLD_MID = 0.04;
      // Order: a1, b1, c1, a2, b2, c2, a3, b3, c3 — staggered across columns
      const BULLETS = [
        { id: "a1", text: "権限境界の検査", path: "#s9-p-a1", bullet: "#s9-b-a1" },
        { id: "b1", text: "命名と抽象度", path: "#s9-p-b1", bullet: "#s9-b-b1" },
        { id: "c1", text: "既存テストの整合", path: "#s9-p-c1", bullet: "#s9-b-c1" },
        { id: "a2", text: "入力サニタイズ確認", path: "#s9-p-a2", bullet: "#s9-b-a2" },
        { id: "b2", text: "後方互換の確認", path: "#s9-p-b2", bullet: "#s9-b-b2" },
        { id: "c2", text: "追加要否の判断", path: "#s9-p-c2", bullet: "#s9-b-c2" },
        { id: "a3", text: "監査ログの網羅", path: "#s9-p-a3", bullet: "#s9-b-a3" },
        { id: "b3", text: "代替案との比較", path: "#s9-p-b3", bullet: "#s9-b-b3" },
        { id: "c3", text: "検証可能性の評価", path: "#s9-p-c3", bullet: "#s9-b-c3" },
      ];

      const BULLET_SEQ_START = 0.95;
      let cumulative = BULLET_SEQ_START;
      BULLETS.forEach((b) => {
        const dur = BULLET_BASE + b.text.length * SEC_PER_CHAR + HOLD_MID;
        const start = cumulative;
        // text fade-in (snap)
        tl.to(b.bullet, { opacity: 1, duration: DUR.snap, ease: EASE.entry }, start);
        // ink under-line drawing
        tl.to(b.path, { strokeDashoffset: 0, duration: DUR.med, ease: EASE.entry }, start + 0.04);
        cumulative += dur * 0.34; // tight stagger so all 9 finish by ~3.5s
      });

      // ---------- Verdict stamps — staccato slam (4.2s, 4.45s, 4.7s) ----------
      // Each stamp is held at -4° throughout (no counter-rotation) and slams scale 1.18 → 1.
      tl.to("#s9-stamp-a", { opacity: 1, scale: 1, duration: DUR.snap, ease: EASE.emphasis }, 4.20);
      tl.to("#s9-stamp-b", { opacity: 1, scale: 1, duration: DUR.snap, ease: EASE.emphasis }, 4.45);
      tl.to("#s9-stamp-c", { opacity: 1, scale: 1, duration: DUR.snap, ease: EASE.emphasis }, 4.70);

      // ---------- Keyword chips fade in just after the last stamp ----------
      tl.to("#s9-kw-parallel", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 5.05);
      tl.to("#s9-kw-verdict", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 5.25);

      // ---------- asr-keyword-glow — envelope drives glow + scale on two words ----------
      const KW_TIMINGS = {
        parallel: { start: 5.40, end: 5.95 },
        verdict:  { start: 6.05, end: 6.65 },
      };
      const ATTACK_DUR = 0.18;
      const RELEASE = 0.35;
      const REST_LEVEL = 0.18;
      const MAX_BLUR = 22;
      const MAX_SCALE_BOOST = 0.07;
      function envelope(time, start, end) {
        const releaseEnd = end + RELEASE;
        if (time < start) return 0;
        if (time < end) return Math.min((time - start) / ATTACK_DUR, 1);
        if (time < releaseEnd) {
          const decay = (time - end) / RELEASE;
          return 1 - decay * (1 - REST_LEVEL);
        }
        return REST_LEVEL;
      }
      const kwEls = document.querySelectorAll(".s9-kw");
      const glowDriver = { t: 0 };
      const GLOW_RUN = 1.85; // 5.30 → 7.15
      tl.to(glowDriver, {
        t: GLOW_RUN,
        duration: GLOW_RUN,
        ease: "none",
        onUpdate: () => {
          const localT = glowDriver.t + 5.30; // remap into scene clock
          kwEls.forEach((el) => {
            const k = el.dataset.word;
            const timing = KW_TIMINGS[k];
            if (!timing) return;
            const env = envelope(localT, timing.start, timing.end);
            const blur = MAX_BLUR * env;
            const scale = 1 + MAX_SCALE_BOOST * env;
            // brand-accent halo modulated by env alpha
            el.style.textShadow = `0 0 ${blur}px rgba(194, 52, 43, ${0.18 + env * 0.55})`;
            el.style.transform = `scale(${scale})`;
          });
        },
      }, 5.30);

      // ---------- sine-wave-loop — ONE breathing element: the caret ----------
      // Subtle blink-like opacity oscillation; runs from 0.7s until 7.30s
      // (ends ≥0.5s before composition end so final 0.5s is fully static).
      const caretPhase = { p: 0 };
      const CARET_IDLE_START = 0.70;
      const CARET_IDLE_DUR = 6.60; // 0.70 → 7.30, leaves 0.5s static tail
      const CARET_CYCLES = 5; // ~1.32s per cycle — gentle cursor breathing
      tl.to(caretPhase, {
        p: Math.PI * 2 * CARET_CYCLES,
        duration: CARET_IDLE_DUR,
        ease: "none",
        onUpdate: () => {
          // pure opacity breath + tiny y nudge (±1px, ±0.5% scale on width)
          const s = Math.sin(caretPhase.p);
          const opac = 0.55 + 0.45 * (0.5 + 0.5 * s);
          const dy = s * 1;
          const sc = 1 + s * 0.005;
          const caret = document.getElementById("s9-caret");
          if (caret) {
            caret.style.opacity = String(opac);
            caret.style.transform = `translateY(${dy}px) scaleY(${sc})`;
          }
        },
      }, CARET_IDLE_START);

      // No exit tweens — final 0.5s holds fully static per anti-wobble HARD.
      window.__timelines["scene_9"] = tl;
    </script>
  </div>
</template>
