<template id="scene_8-template">
  <div id="root" class="scene_8-root" data-composition-id="scene_8" data-width="1920" data-height="1080" data-duration="7.24" style="position:relative; width:1920px; height:1080px; overflow:hidden;">
    <style>

        z-index: 2;

      }

      .s8-title {

      /* Stage holds the two tilt lanes side by side. */
      .s8-stage {
        position: relative;
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 70px;
        perspective: 1800px;
        padding: 8px 6px 0;

      /* Hand-ruled pencil divider down the center. */

        position: absolute;

        border-left: 1.5px dashed color-mix(in srgb, var(--brand-primary) 55%, transparent);
        transform: translateX(-50%);

      }

      /* Each lane is a 3D-tilted card on cream paper. */
      .s8-lane {
        position: relative;
        background: var(--surface-cream);
        border: var(--border-hairline);
        border-radius: var(--radius-card);

        padding: 36px 40px 32px;
        display: flex;

      .s8-lane.s8-left { transform-origin: right center; }
      .s8-lane.s8-right { transform-origin: left center; }

      .s8-lane-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;

      .s8-lane-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;

      .s8-counter {

      /* Visualization column. */

      /* LEFT lane fill bar — "膨らむ" — fat ink-filled bar growing top-to-bottom. */

      }
      .s8-badges {
        display: flex;

      }
      .s8-badge-line {

      .s8-badge-chip {
        font-family: Inter, system-ui, sans-serif;

        border-radius: var(--radius-card);

        font-family: 'JetBrains Mono', ui-monospace, monospace;

      /* Gold accent — warm focal flip for the "after" lane. */
      .s8-gold-accent {
        position: absolute;

        border: 2px solid var(--brand-primary);
        box-shadow: 4px 5px 0 0 var(--brand-primary);
        display: flex;
        align-items: center;

      /* Caveat-style scribble notes inside each lane. */

      .s8-scribble.s8-left,

      /* Narration phrase strip — 常に空 / 鈍らない glow words. */
      .s8-narration {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: 22px;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 700;

        letter-spacing: 0.02em;
        color: var(--brand-primary);

      .s8-word {
        display: inline-block;

        text-shadow: 0 0 0 transparent;
        will-change: transform, text-shadow;
        opacity: 0.55;
      }
      .s8-word.s8-dim {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.45;
      }
    </style>

        <div class="s8-lane s8-right" id="s8-lane-right" data-layout-role="primary" data-layout-act="after">

          <div class="s8-lane-head">
            <span class="s8-lane-label">after</span>

          <div class="s8-counter-row">
            <span class="s8-counter" id="s8-counter-right">0</span>
            <span class="s8-counter-suffix">tokens</span>
          </div>
          <div class="s8-viz">

              <div class="s8-parent-line" id="s8-parent-line" data-layout-allow-overflow="true">
                <span class="s8-parent-line-label" data-layout-allow-overflow="true">PARENT &middot; /rig:talk</span>

    <script>
      // Canonical role keys (pasted inline from easings.js per skill contract).
      const EASE = {
        entry: "power2.out",
        emphasis: "power3.out",
        exit: "power2.in",
        drift: "sine.inOut",
      };
      const DUR = { snap: 0.18, med: 0.5, slow: 0.95 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---------- Initial hidden state ----------
      gsap.set("#s8-lane-left", { rotateY: 4, opacity: 0, x: -40 });
      gsap.set("#s8-lane-right", { rotateY: -4, opacity: 0, x: 40 });
      gsap.set("#s8-divider", { scaleY: 0, transformOrigin: "top center", opacity: 0 });
      gsap.set("#s8-fill-bar", { opacity: 0.95 });
      gsap.set("#s8-parent-line", { scaleX: 0, transformOrigin: "left center", opacity: 0 });
      gsap.set("#s8-badge-1, #s8-badge-2, #s8-badge-3", { opacity: 0, y: 18 });
      gsap.set("#s8-gold-accent", { opacity: 0, scale: 0.6, rotation: -8 });
      gsap.set("#s8-scribble-left", { opacity: 0, x: -12 });
      gsap.set("#s8-scribble-right", { opacity: 0, x: -12 });
      gsap.set("#s8-counter-left", { opacity: 0 });
      gsap.set("#s8-counter-right", { opacity: 0 });

      // ---------- Phase 1: divider + lanes settle (0 - 0.7s) ----------
      tl.to("#s8-divider", { scaleY: 1, opacity: 1, duration: DUR.med, ease: EASE.entry }, 0.0);
      tl.to("#s8-lane-left", { x: 0, opacity: 1, duration: DUR.med, ease: EASE.entry }, 0.1);
      tl.to("#s8-lane-right", { x: 0, opacity: 1, duration: DUR.med, ease: EASE.entry }, 0.18);

      // ---------- Phase 2 (0.55 - 2.8s): LEFT primary — counter + fill bar climb ----------
      tl.to("#s8-counter-left", { opacity: 1, duration: DUR.snap, ease: EASE.entry }, 0.55);

      // Counter + fill-bar height co-driven via one proxy (counting-dynamic-scale pattern).
      const leftCounterEl = document.getElementById("s8-counter-left");
      const fillBarEl = document.getElementById("s8-fill-bar");
      const leftState = { v: 0, h: 0 };
      tl.to(leftState, {
        v: 18420,
        h: 96,
        duration: 2.1,
        ease: EASE.emphasis,
        onUpdate: () => {
          leftCounterEl.textContent = Math.round(leftState.v).toLocaleString();
          fillBarEl.style.height = leftState.h + "%";
        },
      }, 0.7);

      // Left scribble lands during the swell.
      tl.to("#s8-scribble-left", { opacity: 1, x: 0, duration: DUR.med, ease: EASE.entry }, 2.3);

      // ---------- Phase 3 (2.85 - 3.4s): HANDOFF — left demotes to supporting ----------
      tl.to("#s8-fill-bar", { opacity: 0.32, scaleY: 0.8, duration: DUR.med, ease: EASE.exit, transformOrigin: "top center" }, 2.85);
      tl.to("#s8-lane-left", { opacity: 0.55, rotateY: 5, duration: DUR.med, ease: EASE.exit }, 2.85);
      tl.to("#s8-counter-left", { opacity: 0.45, duration: DUR.med, ease: EASE.exit }, 2.85);

      // ---------- Phase 4 (3.4 - 5.4s): RIGHT becomes primary — parent inks, badges arrive ----------
      tl.to("#s8-counter-right", { opacity: 1, duration: DUR.snap, ease: EASE.entry }, 3.4);

      const rightCounterEl = document.getElementById("s8-counter-right");
      const rightState = { v: 0 };
      tl.to(rightState, {
        v: 1280,
        duration: 1.2,
        ease: EASE.emphasis,
        onUpdate: () => {
          rightCounterEl.textContent = Math.round(rightState.v).toLocaleString();
        },
      }, 3.5);

      // Parent line inks left-to-right.
      tl.to("#s8-parent-line", { scaleX: 1, opacity: 1, duration: DUR.slow, ease: EASE.entry }, 3.5);

      // Three subagent badges fade up in sequence (sub-dispatch beat).
      tl.to("#s8-badge-1", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 4.05);
      tl.to("#s8-badge-2", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 4.22);
      tl.to("#s8-badge-3", { opacity: 1, y: 0, duration: DUR.med, ease: EASE.entry }, 4.40);

      // Right scribble — "空のまま" — settles after badges.
      tl.to("#s8-scribble-right", { opacity: 1, x: 0, duration: DUR.med, ease: EASE.entry }, 4.85);

      // ---------- Phase 5 (5.4 - 6.4s): stillness-before-climax pause, then GOLD ACCENT lands ----------
      tl.to("#s8-gold-accent", { opacity: 1, scale: 1, rotation: -4, duration: DUR.med, ease: EASE.emphasis }, 5.9);

      // ---------- Phase 6 (6.4 - 7.24s): tail fully static — no scheduled tweens. ----------

      // ---------- ASR keyword glow driver (single 0 → 7.24 driver, ease "none") ----------
      const TIMINGS = {
        ctx:        { start: 0.6, end: 1.0 },
        karaalways: { start: 1.2, end: 2.4 },
        sep:        { start: 2.5, end: 2.7 },
        nibranai:   { start: 3.0, end: 4.2 },
      };
      const ATTACK_DUR = 0.16;
      const RELEASE = 0.4;
      const REST_LEVEL = 0.18;
      const MAX_BLUR = 28;
      const MAX_SCALE_BOOST = 0.12;
      const wordEls = document.querySelectorAll(".s8-word");

      function envelope(t, start, end) {
        const releaseEnd = end + RELEASE;
        if (t < start) return 0;
        if (t < end) return Math.min((t - start) / ATTACK_DUR, 1);
        if (t < releaseEnd) {
          const decay = (t - end) / RELEASE;
          return 1 - decay * (1 - REST_LEVEL);
        }
        return REST_LEVEL;
      }

      const driver = { t: 0 };
      tl.to(driver, {
        t: 7.24,
        duration: 7.24,
        ease: "none",
        onUpdate: () => {
          wordEls.forEach((el) => {
            const key = el.dataset.word;
            const timing = TIMINGS[key];
            if (!timing) return;
            const env = envelope(driver.t, timing.start, timing.end);
            const blur = MAX_BLUR * env;
            const scale = 1 + MAX_SCALE_BOOST * env;
            const baseOpacity = el.classList.contains("s8-dim") ? 0.45 : 0.55;
            const lift = (1 - baseOpacity) * env;
            el.style.opacity = baseOpacity + lift;
            el.style.textShadow = "0 0 " + blur.toFixed(1) + "px rgba(31, 58, 138, " + (0.15 + env * 0.45).toFixed(2) + ")";
            el.style.transform = "scale(" + scale.toFixed(3) + ")";
          });
        },
      }, 0);

      window.__timelines["scene_8"] = tl;
    </script>

</template>
